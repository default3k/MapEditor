{% extends 'clan/base_clan.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header">
                <h4 class="mb-0">
                    <i class="fas fa-{% if player %}user-edit{% else %}user-plus{% endif %} me-2"></i>
                    {{ title }}
                </h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Никнейм</label>
                            <input type="text" name="nickname" value="{{ form.nickname.value|default:'' }}" class="form-control custom-input" placeholder="Введите ник" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Discord</label>
                            <input type="text" name="discord_nick" value="{{ form.discord_nick.value|default:'' }}" class="form-control custom-input" placeholder="@username">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Средний урон</label>
                            <input type="number" name="average_damage" value="{{ form.average_damage.value|default:'0' }}" class="form-control custom-input" min="0">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label d-block">Активен</label>
                            <div class="form-check form-switch mt-2">
                                <input type="checkbox" name="is_active" class="form-check-input custom-switch" id="is_active" {% if form.is_active.value or not player %}checked{% endif %}>
                                <label class="form-check-label text-muted" for="is_active">Активный игрок</label>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Заметки командира</label>
                        <textarea name="commander_notes" class="form-control custom-textarea" rows="4" placeholder="Дополнительная информация об игроке...">{{ form.commander_notes.value|default:'' }}</textarea>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'clan:player_list' %}" class="btn btn-secondary custom-btn">
                            <i class="fas fa-arrow-left"></i> Назад
                        </a>
                        <button type="submit" class="btn btn-clan custom-btn">
                            <i class="fas fa-save"></i> Сохранить
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
/* Простые рабочие стили */
.custom-input, .custom-textarea {
    background-color: #2d2d2d !important;
    border: 2px solid #444 !important;
    border-radius: 8px !important;
    color: #e0e0e0 !important;
    padding: 10px 15px !important;
    width: 100% !important;
}

.custom-input:focus, .custom-textarea:focus {
    background-color: #333 !important;
    border-color: #0a58ca !important;
    color: #fff !important;
    outline: none !important;
    box-shadow: 0 0 0 3px rgba(10,88,202,0.2) !important;
}

.custom-textarea {
    resize: vertical;
    min-height: 100px;
}

.custom-switch {
    background-color: #2d2d2d !important;
    border: 2px solid #444 !important;
    width: 50px !important;
    height: 24px !important;
    cursor: pointer !important;
}

.custom-switch:checked {
    background-color: #0a58ca !important;
    border-color: #0a58ca !important;
}

.form-label {
    color: #e0e0e0 !important;
    font-weight: 500 !important;
    margin-bottom: 5px !important;
}

.custom-btn {
    padding: 10px 25px !important;
    border-radius: 8px !important;
    font-weight: 500 !important;
    transition: all 0.2s !important;
}

.btn-secondary.custom-btn {
    background-color: #333 !important;
    border: 2px solid #444 !important;
    color: #e0e0e0 !important;
}

.btn-secondary.custom-btn:hover {
    background-color: #3a3a3a !important;
    border-color: #555 !important;
}

.btn-clan.custom-btn {
    background: linear-gradient(135deg, #0a58ca, #3d8bfd) !important;
    border: none !important;
    color: white !important;
}

.btn-clan.custom-btn:hover {
    transform: translateY(-2px) !important;
    box-shadow: 0 5px 15px rgba(10,88,202,0.3) !important;
}

/* Убираем белый фон при автозаполнении */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus,
textarea:-webkit-autofill,
textarea:-webkit-autofill:hover,
textarea:-webkit-autofill:focus {
    -webkit-text-fill-color: #e0e0e0 !important;
    -webkit-box-shadow: 0 0 0px 1000px #2d2d2d inset !important;
    transition: background-color 5000s ease-in-out 0s !important;
}
</style>
{% endblock %}
